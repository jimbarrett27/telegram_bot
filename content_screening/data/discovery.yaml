# OpenAlex discovery configuration.
#
# OpenAlex is an additive discovery source alongside the arXiv and journal RSS
# feeds. A paper becomes a candidate if ANY configured signal matches; the
# signal(s) are recorded on each article's `surfaced_by`. Everything still flows
# through the normal screen -> embed -> insert pipeline (no shortcuts).

# Contact for the OpenAlex "polite pool" (faster, more reliable rate limits).
mailto: jimbarrett27@gmail.com

# Topic net (matches ANY assigned topic, not just the primary one -> max recall;
# the LLM screen filters the extra volume). ~160 papers/day across these four.
topics:
  - id: T11943
    name: Pharmacovigilance and Adverse Drug Reactions
  - id: T10508
    name: Patient Safety and Medication Errors
  - id: T13702
    name: Machine Learning in Healthcare
  - id: T11396
    name: Artificial Intelligence in Healthcare

# Authors to follow. Accepts OpenAlex author IDs (start with "A") and/or ORCIDs
# (the 0000-0000-0000-0000 form). Find an ID via
# https://api.openalex.org/authors?search=Name . Everything they publish is
# surfaced regardless of topic.
monitored_authors: []
  # - A5086198262          # OpenAlex author ID
  # - 0000-0002-9322-3515  # ORCID

# Individual seed papers (OpenAlex work IDs) whose *citers* we want to surface.
# Use for hand-picked high-precision method papers.
seed_papers: []
  # - W2150248073

# Institutions whose first/last-author works form a citation seed: we surface
# recent papers that CITE those works. UMC (Uppsala Monitoring Centre) below.
institutions:
  - id: I111684115
    name: Uppsala Monitoring Centre
    author_positions: [first, last]
